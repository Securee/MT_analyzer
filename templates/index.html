<!DOCTYPE html>
<html>

<head>
    <title>Mariana Trench Analysis Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <style>
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 900px;
            margin: 0 auto;
        }

        .target-box {
            background: #ecf0f1;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }

        .target-box input {
            flex: 1;
            padding: 10px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            font-size: 16px;
            margin-right: 10px;
        }

        .target-box button {
            background-color: #f1c40f;
            color: #333;
            border: none;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .target-box button:hover {
            background-color: #f39c12;
        }

        .btn-stop {
            background-color: #e74c3c;
            margin-left: 8px;
        }

        .btn-stop:hover {
            background-color: #c0392b;
        }

        .btn-secondary {
            background-color: #95a5a6;
        }

        .btn-secondary:hover {
            background-color: #7f8c8d;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 8px;
            width: 500px;
            max-width: 90%;
            position: relative;
        }

        .modal-content h3 {
            margin-top: 0;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #34495e;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .close-btn {
            position: absolute;
            right: 20px;
            top: 20px;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            color: #7f8c8d;
        }

        .close-btn:hover {
            color: #333;
        }
    </style>
</head>

<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>🛡️ Mariana Trench Dashboard</h1>
            <div>
                <button onclick="openSettings()" class="btn btn-secondary"
                    style="height: 38px; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; color: white; display: inline-block;">⚙️
                    Settings</button>
                <a href="/config" class="btn btn-start"
                    style="height: 20px; line-height: 20px; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; color: white; display: inline-block; background-color: #3498db; text-decoration: none; margin-left: 10px;">⚙️
                    Config Manager</a>
            </div>
        </div>

        <div class="target-box">
            <input type="text" id="new-target" placeholder="/path/to/Single.apk OR /path/to/Directory/of/APKs">
            <button onclick="addTarget()">Track Target</button>
            <button onclick="openAdbModal()"
                style="margin-left: 10px; background-color: #9b59b6; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold;">📱
                Pull from Device</button>
            <button onclick="analyzeAll()" class="btn-analyze"
                style="margin-left: 15px; background-color: #e67e22; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold;">Analyze
                All</button>
        </div>

        <div id="list-container">
            Loading...
        </div>

    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeSettings()">&times;</span>
            <h3>⚙️ Dashboard Settings</h3>
            <div class="form-group">
                <label>Mariana Trench Installation Dir (MT_DIR)</label>
                <input type="text" id="mt-dir-input" placeholder="/path/to/mariana-trench">
            </div>
            <div class="form-group">
                <label>Workspace APKs Dir (APK_DIR)</label>
                <input type="text" id="apk-dir-input" placeholder="Where ADB pulled APKs should be saved">
                <small style="color: #7f8c8d;">Example: /home/lzy/workspace_apks</small>
            </div>
            <button onclick="saveSettings()"
                style="width: 100%; margin-top: 10px; background-color: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold;">Save
                Settings</button>
        </div>
    </div>

    <!-- ADB Pull Modal -->
    <div id="adbModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeAdb()">&times;</span>
            <h3>📱 Pull APK from Device</h3>
            <div class="form-group">
                <label>Select Device</label>
                <div style="display:flex; gap:10px;">
                    <select id="adb-devices-select" onchange="loadAdbPackages()">
                        <option value="">Scanning...</option>
                    </select>
                    <button onclick="loadAdbDevices()"
                        style="background-color: #95a5a6; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer;">Refresh</button>
                </div>
            </div>
            <div class="form-group">
                <label>Select Application Package</label>
                <select id="adb-packages-select">
                    <option value="">Select a device first</option>
                </select>
            </div>
            <p id="adb-status" style="color: #e67e22; font-size: 0.9em; font-weight: bold;"></p>
            <button id="adb-pull-btn" onclick="pullApk()"
                style="width: 100%; margin-top: 10px; background-color: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold;"
                disabled>📥 Pull & Track</button>
        </div>
    </div>
    <!-- AI Analysis Modal -->
    <div id="aiModal" class="modal">
        <div class="modal-content" style="width: 800px; max-height: 80vh; overflow-y: auto;">
            <span class="close-btn" onclick="closeAiModal()">&times;</span>
            <h3>🧠 AI Security Analysis</h3>
            <div id="ai-loading" style="display: none; text-align: center; padding: 20px;">
                <p>🤖 Gemini is analyzing the security findings... Please wait.</p>
                <div class="loader" style="border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto;"></div>
                <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
            </div>
            <div id="ai-content" style="line-height: 1.6; color: #2c3e50;">
                <!-- Markdown content will be injected here -->
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/dashboard.js') }}?v={{ range(1, 100000) | random }}"></script>
    <!-- Log Modal -->
    <div id="logModal" class="modal">
        <div class="modal-content" style="width: 900px; max-height: 85vh; display: flex; flex-direction: column;">
            <span class="close-btn" onclick="closeLogModal()">&times;</span>
            <h3 style="margin-bottom: 15px;">📜 Analysis Logs</h3>
            <div id="log-content" style="flex: 1; overflow: auto; background: #2c3e50; color: #ecf0f1; padding: 15px; border-radius: 4px; font-family: 'Courier New', Courier, monospace; white-space: pre-wrap; font-size: 0.9em;">
                <!-- Logs will be injected here -->
            </div>
            <button onclick="closeLogModal()" style="margin-top: 15px; background-color: #7f8c8d; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold;">Close</button>
        </div>
    </div>
</body>

</html>

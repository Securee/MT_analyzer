<!DOCTYPE html>
<html>

<head>
    <title>Config Manager - MT Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/config.css') }}?v={{ range(1, 100000) | random }}">
</head>

<body>
    <div class="header">
        <h1>⚙️ Config Manager</h1>
        <a href="/" class="btn btn-secondary">← Back to Dashboard</a>
    </div>
    <div class="main">
        <div class="sidebar">
            <div class="sidebar-header">
                <span style="font-weight: bold; color: #7f8c8d;">Files</span>
                <button class="btn btn-primary" style="padding: 4px 10px;" onclick="newFile()">+ New</button>
            </div>
            <ul class="file-list" id="file-list">Loading...</ul>
        </div>
        <div class="editor">
            <div class="editor-toolbar">
                <label style="color:#7f8c8d;">Path:</label>
                <input type="text" id="file-path" placeholder="e.g. model-generators/sinks/MySink.models" readonly>
                <button class="btn btn-secondary" id="toggle-view-btn" onclick="toggleViewMode()"
                    style="display:none;">👁 Visual Mode</button>
                <button class="btn btn-success" onclick="saveFile()">Save</button>
                <button class="btn btn-danger" onclick="deleteFile()">Delete</button>
            </div>
            <textarea id="file-content" spellcheck="false"
                placeholder="Select a file from the left or click '+ New' to create one..."></textarea>
            <div id="visual-editor"
                style="display: none; flex: 1; padding: 20px; overflow-y: auto; background: #fdfdfd;"></div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/config.js') }}?v={{ range(1, 100000) | random }}"></script>
</body>

</html>
